<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>GitHub PAT 快速測試</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .subtitle { color: #666; margin-top: 0; font-size: 0.9rem; }
    fieldset {
      margin-top: 1.25rem;
      padding: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    legend { padding: 0 0.5rem; font-weight: 600; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.25rem; margin-top: 0.75rem; }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.5rem;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 0.9rem;
      border: 1px solid #aaa;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .row { display: flex; gap: 0.5rem; align-items: stretch; margin-top: 0.75rem; }
    .row input { flex: 1; }
    .repo-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.25rem; }
    .repo-row input { flex: 1; }
    .repo-row span { color: #888; font-size: 1rem; }
    button {
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
      border: 1px solid #888;
      border-radius: 4px;
      background: #f4f4f4;
    }
    button:hover:not(:disabled) { background: #e4e4e4; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .help {
      font-size: 0.82rem;
      color: #666;
      margin-top: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: rgba(0, 120, 200, 0.07);
      border-left: 3px solid #0078c8;
      border-radius: 3px;
    }
    .help a { color: #0078c8; }
    .fork-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: #555;
    }
    pre#log {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #1e1e1e;
      color: #eee;
      border-radius: 4px;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 50vh;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>GitHub PAT 快速測試</h1>
  <p class="subtitle">
    驗證您的 Personal Access Token 是否具備正確的存取權限。
  </p>

  <fieldset>
    <legend>設定</legend>

    <label for="pat">GitHub Personal Access Token（PAT）</label>
    <input
      type="password"
      id="pat"
      placeholder="ghp_..."
      autocomplete="off"
      spellcheck="false"
    />

    <div class="help">
      尚未建立 PAT？請前往
      <a
        href="https://github.com/settings/personal-access-tokens/new"
        target="_blank"
        rel="noopener noreferrer"
      >github.com/settings/personal-access-tokens/new</a>
      建立一個細粒度權杖（Fine-grained PAT），並勾選以下權限：
      <strong>Contents（Read &amp; write）</strong>、
      <strong>Pull requests（Read &amp; write）</strong>、
      <strong>Metadata（Read）</strong>。
    </div>

    <label>目標儲存庫</label>
    <div class="repo-row">
      <input
        type="text"
        id="owner"
        value="whats2000"
        placeholder="擁有者（owner）"
        autocomplete="off"
        spellcheck="false"
      />
      <span>/</span>
      <input
        type="text"
        id="repo"
        value="GPE-Practice"
        placeholder="儲存庫名稱（repo）"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="fork-row">
      <input type="checkbox" id="test-fork" />
      <label for="test-fork" style="margin:0; color:#555;">
        同時測試 Fork 權限（POST /repos/{owner}/{repo}/forks）
      </label>
    </div>

    <div class="row">
      <button id="verify" type="button">驗證 Token</button>
    </div>
  </fieldset>

  <pre id="log">等待輸入 PAT …</pre>

  <script type="module" src="./driver.js"></script>
</body>
</html>
